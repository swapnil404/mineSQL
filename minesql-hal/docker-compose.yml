services:
  mc:
    image: itzg/minecraft-server:java21
    container_name: minesql-mc
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21"
      ENABLE_RCON: "false"
      MEMORY: 2G
    ports:
      - "25565:25565"
      - "25576:25576"
    volumes:
      - mc_data:/data
      - ./target/minesql-hal-0.1.0.jar:/plugins/minesql-hal-0.1.0.jar
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  mc_data:
